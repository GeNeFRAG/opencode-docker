# ═══════════════════════════════════════════════════════════════════
# tmux configuration for opencode-docker (TUI mode)
# ═══════════════════════════════════════════════════════════════════
# Philosophy: tmux is invisible infrastructure.  It exists only for
# session persistence (surviving browser disconnects).  By default
# the user sees ONLY opencode — identical to plain tui mode.
#
# Opt-in features:
#   Ctrl-Space m  → toggle agent monitor pane
#   Ctrl-Space M  → agent monitor in full-screen window
#   Ctrl-Space s  → toggle status bar (agent status, clock)
# ═══════════════════════════════════════════════════════════════════

# ─── Terminal — passthrough with minimal interference ─────────────
# Use xterm-256color instead of tmux-256color so apps inside tmux
# see the same TERM the outer terminal (ttyd/xterm.js) advertises.
# This avoids capability mismatches where tmux-256color is missing
# features that xterm-256color has (e.g. bce, ccc, npc).
set -g default-terminal "xterm-256color"
# Enable 24-bit truecolor passthrough + colored underlines (Smulx)
set -ga terminal-overrides ",xterm-256color:Tc:Smulx=\\E[4::%p1%dm"
# Pass RGB sequences through unchanged to the outer terminal
set -ga terminal-features ",xterm-256color:RGB"
# Propagate COLORTERM so TUI apps detect truecolor without probing
set-environment -g COLORTERM truecolor

# ─── Unicode / UTF-8 ─────────────────────────────────────────────
# Allow applications to send escape sequences through tmux to the
# outer terminal (needed for some Unicode rendering in ttyd/xterm.js)
set -gq allow-passthrough on
# Propagate UTF-8 locale so all shells and TUI apps render correctly
set-environment -g LANG "C.UTF-8"
set-environment -g LC_ALL "C.UTF-8"

# ─── General ──────────────────────────────────────────────────────
set -g mouse on
set -g history-limit 50000
set -g escape-time 0
set -g focus-events on
set -g set-clipboard on

# Start windows and panes at 1 (matches keyboard layout)
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# ─── Prefix ───────────────────────────────────────────────────────
# Ctrl-Space avoids conflicts with opencode's TUI and works well
# on all keyboard layouts (including German)
set -g prefix C-Space
unbind C-b
unbind C-a
bind C-Space send-prefix

# ─── Pane management ─────────────────────────────────────────────
# Split panes with | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes with Shift + arrow
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Quick pane cycling with prefix twice
bind C-Space select-pane -t :.+

# ─── Window management ───────────────────────────────────────────
bind c new-window -c "#{pane_current_path}"

# ─── Status bar ──────────────────────────────────────────────────
# Off by default — tmux should be fully transparent (identical to
# plain tui mode).  Toggle with:  Ctrl-a s
set -g status on
set -g status-position bottom
set -g status-interval 3

set -g status-style "bg=#1a1b26,fg=#a9b1d6"
set -g status-left "#(bash /opt/opencode/session-status.sh 2>/dev/null)"
set -g status-left-length 80
# Right side: active subagent indicator + clock
# agent-status.sh outputs nothing when idle, or "N ⚡agent·names" when active
set -g status-right "#(bash /opt/opencode/agent-status.sh 2>/dev/null) #[fg=#565f89] #(date '+%%H:%%M') "
set -g status-right-length 60

setw -g window-status-format "#[fg=#565f89] #I:#W "
setw -g window-status-current-format "#[fg=#7aa2f7,bold] #I:#W "
setw -g window-status-separator ""

# Pane borders
set -g pane-border-style "fg=#3b4261"
set -g pane-active-border-style "fg=#7aa2f7"

# ─── Copy mode (vi keys) ─────────────────────────────────────────
setw -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# ─── Quality of life ─────────────────────────────────────────────
# Reload config
bind r source-file /root/.tmux.conf \; display "Config reloaded"

# ─── Agent Monitor ───────────────────────────────────────────────
# These use the prefix key (Ctrl-Space):
#   prefix m  → Toggle agent monitor pane (25% height, bottom)
#   prefix M  → Open monitor in a new window (full screen)
#   prefix s  → Toggle status bar (agent status, clock)
bind m run-shell "bash /opt/opencode/agent-monitor-toggle.sh"
bind M new-window -n "monitor" "bash /opt/opencode/agent-monitor.sh"
bind s set-option -g status

# Root-level shortcuts (no prefix needed, German Mac Option-key):
#   Option-m   → Toggle agent monitor pane
#   Option-s   → Toggle status bar
#   Option-M   → Agent monitor fullscreen window
bind -T root µ run-shell "bash /opt/opencode/agent-monitor-toggle.sh"
bind -T root ‚ set-option -g status
bind -T root Ò new-window -n "monitor" "bash /opt/opencode/agent-monitor.sh"

# ─── Auto-respawn opencode on /exit ──────────────────────────────
# remain-on-exit keeps dead panes so pane-died hook can fire.
# Hook respawns the opencode pane (window 1, pane 1) after 2s.
# All other dead panes are cleaned up immediately.
set -g remain-on-exit on
set-hook -g pane-died {
    if-shell "[ '#{window_index}' = '1' ] && [ '#{pane_index}' = '1' ]" {
        run-shell "sleep 2 && tmux respawn-pane -k -t '#{pane_id}'"
    } {
        kill-pane -t '#{pane_id}'
    }
}
