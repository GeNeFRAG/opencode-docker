# ═══════════════════════════════════════════════════════════════════
# OpenCode Web — Multi-Repo Setup
# Each repo gets its own service, port, and data volume.
#
# To add your own project repos, create a docker-compose.override.yml
# (gitignored) — see docker-compose.override.yml.example
# ═══════════════════════════════════════════════════════════════════

x-opencode-common: &opencode-common
  build:
    context: .
    dockerfile: Dockerfile
    args:
      OPENCODE_VERSION: ${OPENCODE_VERSION:-latest}
  restart: unless-stopped
  env_file:
    - .env
  environment: &opencode-env
    - NODE_EXTRA_CA_CERTS=/certs/ca-bundle.pem
    - REQUESTS_CA_BUNDLE=/certs/ca-bundle.pem
  volumes: &opencode-volumes
    # ─── OpenCode config (commands, skills, plugins) ───────────
    - ${HOME}/.config/opencode/commands:/root/.config/opencode/commands:ro
    - ${HOME}/.config/opencode/skills:/root/.config/opencode/skills:ro
    - ${HOME}/.config/opencode/oh-my-opencode-slim.json:/root/.config/opencode/oh-my-opencode-slim.json:ro
    # ─── Agent skills ─────────────────────────────────────────
    - ${HOME}/.agents/skills:/root/.agents/skills:ro
    # ─── Docker socket (for MCP containers) ───────────────────
    - /var/run/docker.sock:/var/run/docker.sock
    # ─── SSH & Git ────────────────────────────────────────────
    - ${HOME}/.ssh:/root/.ssh:ro
    - ${HOME}/.gitconfig:/root/.gitconfig:ro
    - ${GIT_CREDENTIALS_PATH:-/dev/null}:/root/.git-credentials:ro
    # ─── CA certificate (optional, for corporate proxies) ─────
    - ${CA_CERT_PATH:-/dev/null}:/certs/ca-bundle.pem:ro
  healthcheck: &opencode-healthcheck
    interval: 30s
    timeout: 10s
    start_period: 15s
    retries: 3
  deploy:
    resources:
      limits:
        memory: 4G
      reservations:
        memory: 1G

services:
  # ─────────────────────────────────────────────────────────────
  # opencode-docker (this repo) — http://localhost:3000
  # ─────────────────────────────────────────────────────────────
  opencode-docker:
    <<: *opencode-common
    container_name: opencode-self
    ports:
      - "3000:3000"
    healthcheck:
      <<: *opencode-healthcheck
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
    environment:
      - NODE_EXTRA_CA_CERTS=/certs/ca-bundle.pem
      - REQUESTS_CA_BUNDLE=/certs/ca-bundle.pem
      - OPENCODE_PORT=3000
    volumes:
      - .:/workspace
      - opencode-data-self:/root/.local/share/opencode
      - opencode-memory-self:/root/.config/opencode/memory
      # Inherit shared mounts
      - ${HOME}/.config/opencode/commands:/root/.config/opencode/commands:ro
      - ${HOME}/.config/opencode/skills:/root/.config/opencode/skills:ro
      - ${HOME}/.config/opencode/oh-my-opencode-slim.json:/root/.config/opencode/oh-my-opencode-slim.json:ro
      - ${HOME}/.agents/skills:/root/.agents/skills:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - ${HOME}/.ssh:/root/.ssh:ro
      - ${HOME}/.gitconfig:/root/.gitconfig:ro
      - ${GIT_CREDENTIALS_PATH:-/dev/null}:/root/.git-credentials:ro
      - ${CA_CERT_PATH:-/dev/null}:/certs/ca-bundle.pem:ro

volumes:
  opencode-data-self:
    name: opencode-data-self
  opencode-memory-self:
    name: opencode-memory-self
