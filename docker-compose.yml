# ═══════════════════════════════════════════════════════════════════
# OpenCode Web — Multi-Repo Setup
# Each repo gets its own service, port, and data volume.
#
# To add your own project repos, create a docker-compose.override.yml
# (gitignored) — see docker-compose.override.yml.example
# ═══════════════════════════════════════════════════════════════════

x-opencode-common: &opencode-common
  build:
    context: .
    dockerfile: Dockerfile
    args:
      OPENCODE_VERSION: ${OPENCODE_VERSION:-latest}
      FLOWCODE_VERSION: ${FLOWCODE_VERSION:-latest}
    secrets:
      - ca-cert
  restart: unless-stopped
  env_file:
    - .env
  environment: &opencode-env
    - NODE_EXTRA_CA_CERTS=/certs/ca-bundle.pem
    - REQUESTS_CA_BUNDLE=/certs/ca-bundle.pem
    - OPENCODE_ENABLE_EXPERIMENTAL_MODELS=1
    # ─── Coding Agent Selection ─────────────────────────────────
    # OPENCODE_APP: opencode (default) or claude-code
    # Set in .env — see .env.example for details.
  volumes: &opencode-volumes
    # ─── Docker socket (for MCP containers) ───────────────────
    - /var/run/docker.sock:/var/run/docker.sock
    # ─── SSH & Git ────────────────────────────────────────────
    - ${HOME}/.ssh:/root/.ssh:ro
    - ${HOME}/.gitconfig:/root/.gitconfig:ro
    - ${GIT_CREDENTIALS_PATH:-.docker/empty-file}:/root/.git-credentials:ro
    - ${GIT_CONFIG_WORK_PATH:-.docker/empty-file}:/root/.gitconfig-work:ro
    # ─── GitHub Copilot auth (reuse host token) ────────────────
    - ${HOME}/.config/github-copilot:/root/.config/github-copilot:ro
    # ─── Host auth.json (merged at startup for Copilot etc.) ──
    - ${HOST_AUTH_JSON:-.docker/empty-file}:/opt/opencode/host-auth.json:ro
    # ─── CA certificate (optional, for corporate proxies) ─────
    - ${CA_CERT_PATH:-.docker/empty-file}:/certs/ca-bundle.pem:ro
  healthcheck: &opencode-healthcheck
    interval: 30s
    timeout: 10s
    start_period: 15s
    retries: 3
  deploy:
    resources:
      limits:
        memory: 4G
      reservations:
        memory: 1G

services:
  # ─────────────────────────────────────────────────────────────
  # opencode-docker (this repo) — http://localhost:3000
  # ─────────────────────────────────────────────────────────────
  opencode-docker:
    <<: *opencode-common
    container_name: opencode-self
    # ── Network mode ───────────────────────────────────────────────
    # Set DOCKER_NETWORK_MODE=host in .env to bypass the Docker bridge
    # NAT and connect directly via the host's network stack.
    # This eliminates ~70-80ms TCP overhead per new upstream connection
    # and is the recommended setting on Linux when low latency matters.
    # Note: host networking is Linux-only (ignored on Docker Desktop).
    # With host mode, port mapping below is ignored — the container
    # binds directly to the host port set by OPENCODE_PORT.
    network_mode: ${DOCKER_NETWORK_MODE:-bridge}
    ports:
      - "3000:3000"
    healthcheck:
      <<: *opencode-healthcheck
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
    environment:
      - NODE_EXTRA_CA_CERTS=/certs/ca-bundle.pem
      - REQUESTS_CA_BUNDLE=/certs/ca-bundle.pem
      - OPENCODE_ENABLE_EXPERIMENTAL_MODELS=1
    volumes:
      - .:/workspace
      - opencode-data-self:/root/.local/share/opencode
      - opencode-memory-self:/root/.config/opencode/memory
      # Inherit shared mounts
      - /var/run/docker.sock:/var/run/docker.sock
      - ${HOME}/.ssh:/root/.ssh:ro
      - ${HOME}/.gitconfig:/root/.gitconfig:ro
      - ${GIT_CREDENTIALS_PATH:-.docker/empty-file}:/root/.git-credentials:ro
      - ${GIT_CONFIG_WORK_PATH:-.docker/empty-file}:/root/.gitconfig-work:ro
      # ─── GitHub Copilot auth (reuse host token) ────────────────
      - ${HOME}/.config/github-copilot:/root/.config/github-copilot:ro
      # ─── Host auth.json (merged at startup for Copilot etc.) ──
      - ${HOST_AUTH_JSON:-.docker/empty-file}:/opt/opencode/host-auth.json:ro
      - ${CA_CERT_PATH:-.docker/empty-file}:/certs/ca-bundle.pem:ro
      # ─── .env file (reloaded on container restart) ────────
      - ./.env:/opt/opencode/.env:ro

volumes:
  opencode-data-self:
    name: opencode-data-self
  opencode-memory-self:
    name: opencode-memory-self
  # Claude Code session/settings volume — only mounted when OPENCODE_APP=claude-code.
  # ⚠ IMPORTANT: You MUST add `- claude-code-data-self:/root/.claude` to the
  #   service's volumes in docker-compose.override.yml to persist Claude Code
  #   session data. Without this mount, data is lost on `docker compose down`.
  # See docker-compose.override.yml.example for usage.
  # ⚠ After upgrading claude-code version, run: docker volume rm claude-code-data-self
  #   if you encounter compatibility issues with stale session data.
  claude-code-data-self:
    name: claude-code-data-self
  # FlowCode workspace volume — only mounted when OPENCODE_APP=flowcode.
  # ⚠ IMPORTANT: Add `- flowcode-data-self:/var/flowcode/workspaces` to the
  #   service's volumes in docker-compose.override.yml for persistent FlowCode
  #   workspace and session data.
  flowcode-data-self:
    name: flowcode-data-self

secrets:
  ca-cert:
    file: ${CA_CERT_PATH:-.docker/empty-file}
