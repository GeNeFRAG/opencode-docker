# ═══════════════════════════════════════════════════════════════════
# tmux-theme-dark.conf — Tokyo Night dark theme for opencode-docker
# ═══════════════════════════════════════════════════════════════════
# Sourced by tmux.conf on startup and by tmux-theme-toggle.sh at runtime.
# Color palette: Tokyo Night (https://github.com/folke/tokyonight.nvim)

# ─── Theme marker (used by status scripts to pick matching colors) ─
set -g @theme "dark"

# ─── Tell lipgloss this is a dark terminal ────────────────────────
# COLORFGBG is the standard hint for terminal background brightness.
# Format: "fg;bg" — bg >= 8 means dark.  lipgloss reads this at
# startup to choose Dark vs Light AdaptiveColor values.
set-environment -g COLORFGBG "15;0"

# ─── Pane content area (the actual terminal background) ───────────
# window-style applies to all panes; window-active-style to the focused one.
# These override the terminal emulator's default bg/fg inside tmux.
set -g window-style "bg=#1a1b26,fg=#a9b1d6"
set -g window-active-style "bg=#1a1b26,fg=#c0caf5"

# ─── Status bar ───────────────────────────────────────────────────
set -g status-style "bg=#16161e,fg=#a9b1d6"
set -g status-left "#(bash /opt/opencode/tmux/session-status.sh)"
set -g status-left-length 80
set -g status-right "#[fg=#565f89]%H:%M "
set -g status-right-length 20

# ─── Window list ──────────────────────────────────────────────────
setw -g window-status-format "#[fg=#565f89] #I:#W "
setw -g window-status-current-format "#[fg=#7aa2f7,bold] #I:#W "
setw -g window-status-separator ""

# ─── Pane borders ─────────────────────────────────────────────────
set -g pane-border-style "fg=#1a1b26"
set -g pane-active-border-style "fg=#1a1b26"

# ─── Message bar ──────────────────────────────────────────────────
set -g message-style "bg=#1a1b26,fg=#a9b1d6"
set -g message-command-style "bg=#1a1b26,fg=#a9b1d6"

# ─── Copy mode highlight ─────────────────────────────────────────
set -g mode-style "bg=#3b4261,fg=#a9b1d6"
