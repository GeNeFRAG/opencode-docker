# ═══════════════════════════════════════════════════════════════════
# tmux configuration for opencode-docker (TUI mode)
# ═══════════════════════════════════════════════════════════════════
# Philosophy: tmux is invisible infrastructure.  It exists only for
# session persistence (surviving browser disconnects).  By default
# the user sees ONLY opencode — identical to plain tui mode.
#
# Opt-in features:
#   Ctrl-Space m  → toggle agent monitor pane
#   Ctrl-Space M  → agent monitor in full-screen window
#   Ctrl-Space s  → toggle status bar (agent status, clock)
#   Ctrl-Space t  → toggle dark/light theme
# ═══════════════════════════════════════════════════════════════════

# ─── Terminal — passthrough with minimal interference ─────────────
# Use xterm-256color instead of tmux-256color so apps inside tmux
# see the same TERM the outer terminal (ttyd/xterm.js) advertises.
# This avoids capability mismatches where tmux-256color is missing
# features that xterm-256color has (e.g. bce, ccc, npc).
set -g default-terminal "xterm-256color"
# Enable 24-bit truecolor passthrough + colored underlines (Smulx)
set -ga terminal-overrides ",xterm-256color:Tc:Smulx=\\E[4::%p1%dm"
# Pass RGB sequences through unchanged to the outer terminal
set -ga terminal-features ",xterm-256color:RGB"
# Propagate COLORTERM so TUI apps detect truecolor without probing
set-environment -g COLORTERM truecolor

# ─── Unicode / UTF-8 ─────────────────────────────────────────────
# Allow applications to send escape sequences through tmux to the
# outer terminal (needed for some Unicode rendering in ttyd/xterm.js)
set -gq allow-passthrough on
# Propagate UTF-8 locale so all shells and TUI apps render correctly
set-environment -g LANG "C.UTF-8"
set-environment -g LC_ALL "C.UTF-8"

# ─── General ──────────────────────────────────────────────────────
set -g history-limit 50000
set -g escape-time 0
set -g focus-events on
set -g set-clipboard off
set -g mouse on
# Prevent window name from changing to "tmux" when entering copy mode
setw -g automatic-rename off
set  -g allow-rename off
# window-size latest: canvas tracks the most recently active client.
# SIGWINCH from the browser is sufficient — no explicit resize-window hook needed.
set  -g window-size latest

# ─── Copy / clipboard ────────────────────────────────────────────
# ttyd 1.7.7 has no OSC 52 / ClipboardAddon; the only browser→OS
# clipboard path is xterm.js native selection → execCommand('copy').
# Because `mouse on` puts tmux in application-mouse-mode, plain drag
# is captured by tmux and the browser never sees a selection.
#
# To copy to the OS clipboard, hold a modifier while dragging:
#   - macOS:           hold OPTION (⌥) — requires ttyd to be launched
#                      with -t macOptionClickForcesSelection=true (done
#                      in lib/modes.sh); Shift does NOT work on macOS
#   - Linux / Windows: hold SHIFT
# The modifier bypasses application-mouse-mode in xterm.js so the
# browser performs a native selection and auto-copies on release
# (HTTPS secure-context required, already enforced by lib/tls.sh).
#
# The copy-mode bindings below copy into tmux's paste buffer only
# (`prefix ]` to paste within tmux). They do NOT reach the OS clipboard.
setw -g mode-keys vi
bind -T copy-mode-vi v                send-keys -X begin-selection
bind -T copy-mode-vi y                send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi MouseDown1Pane   send-keys -X cancel
bind ] paste-buffer

# Start windows and panes at 1 (matches keyboard layout)
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# ─── Prefix ───────────────────────────────────────────────────────
# Ctrl-Space avoids conflicts with opencode's TUI and works well
# on all keyboard layouts (including German)
set -g prefix C-Space
unbind C-b
unbind C-a
bind C-Space send-prefix

# ─── Pane management ─────────────────────────────────────────────
# Split panes with | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes with Shift + arrow
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Quick pane cycling with prefix twice
bind C-Space select-pane -t :.+

# ─── Window management ───────────────────────────────────────────
bind c new-window -c "#{pane_current_path}"

# ─── Status bar ──────────────────────────────────────────────────
# Dynamic status bar — theme files define status-left (session-status.sh)
# and status-right (clock).  status-interval controls refresh rate.
# session-status.sh caches results and only queries the DB when it changes.
# Agent activity is available via the monitor pane (prefix m).
set -g status off
set -g status-position bottom
set -g status-interval 2

# ─── Theme ────────────────────────────────────────────────────────
# Colors are loaded from a separate theme file so they can be
# switched at runtime.  Default: Tokyo Night (dark).
# Toggle with:  prefix t
source-file /opt/opencode/tmux/tmux-theme-dark.conf


# ─── Quality of life ─────────────────────────────────────────────
# Reload config
bind r source-file /root/.tmux.conf \; display "Config reloaded"

# ─── Agent Monitor ───────────────────────────────────────────────
# These use the prefix key (Ctrl-Space):
#   prefix m  → Toggle agent monitor pane (25% height, bottom)
#   prefix M  → Open monitor in a new window (full screen)
#   prefix s  → Toggle status bar (agent status, clock)
#   prefix t  → Toggle dark/light theme
bind m run-shell "bash /opt/opencode/tmux/agent-monitor-toggle.sh"
bind M new-window -n "monitor" "bash /opt/opencode/tmux/agent-monitor.sh"
bind s set-option -g status
bind t run-shell "bash /opt/opencode/tmux/tmux-theme-toggle.sh"

# Root-level shortcuts are intentionally absent: no-prefix Option-key bindings
# cause accidental splits on non-German keyboards and across different OS layouts.

# ─── Auto-respawn opencode on /exit ──────────────────────────────
# remain-on-exit keeps dead panes so pane-died hook can fire.
# Hook respawns the opencode pane (window 1, pane 1) after 8s.
# Delay is intentionally long: after a sleep/wake cycle the Docker VM
# needs several seconds to re-establish network before opencode can
# connect to the LLM API. A short delay would just crash-loop.
# All other dead panes are cleaned up immediately.
set -g remain-on-exit on
set-hook -g pane-died {
    if-shell "[ '#{window_index}' = '1' ] && [ '#{pane_index}' = '1' ]" {
        run-shell "sleep 8 && tmux respawn-pane -k -c /workspace -t '#{pane_id}' '/tmp/tmux-wrapper.sh --loop --respawn'"
    } {
        kill-pane -t '#{pane_id}'
    }
}
