# ═══════════════════════════════════════════════════════════════════
# tmux-theme-light.conf — Tokyo Night Day (light) theme for opencode-docker
# ═══════════════════════════════════════════════════════════════════
# Sourced by tmux-theme-toggle.sh at runtime.
# Color palette: Tokyo Night Day (https://github.com/folke/tokyonight.nvim)

# ─── Theme marker (used by status scripts to pick matching colors) ─
set -g @theme "light"

# ─── Tell lipgloss this is a light terminal ───────────────────────
# COLORFGBG is the standard hint for terminal background brightness.
# Format: "fg;bg" — bg < 8 means light.  lipgloss reads this at
# startup to choose Dark vs Light AdaptiveColor values.
set-environment -g COLORFGBG "0;15"

# ─── Pane content area (the actual terminal background) ───────────
# window-style applies to all panes; window-active-style to the focused one.
# These override the terminal emulator's default bg/fg inside tmux.
set -g window-style "bg=#d5d6db,fg=#3760bf"
set -g window-active-style "bg=#d5d6db,fg=#3760bf"

# ─── Status bar ───────────────────────────────────────────────────
set -g status-style "bg=#c4c8da,fg=#3760bf"
set -g status-left "#(bash /opt/opencode/tmux/session-status.sh)"
set -g status-left-length 80
set -g status-right "#[fg=#8990b3]%H:%M "
set -g status-right-length 20

# ─── Window list ──────────────────────────────────────────────────
setw -g window-status-format "#[fg=#8990b3] #I:#W "
setw -g window-status-current-format "#[fg=#2e7de9,bold] #I:#W "
setw -g window-status-separator ""

# ─── Pane borders ─────────────────────────────────────────────────
set -g pane-border-style "fg=#d5d6db"
set -g pane-active-border-style "fg=#d5d6db"

# ─── Message bar ──────────────────────────────────────────────────
set -g message-style "bg=#c4c8da,fg=#3760bf"
set -g message-command-style "bg=#c4c8da,fg=#3760bf"

# ─── Copy mode highlight ─────────────────────────────────────────
set -g mode-style "bg=#b6bfe2,fg=#3760bf"
